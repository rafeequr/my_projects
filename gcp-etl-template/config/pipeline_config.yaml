project_id: your-gcp-project
region: asia-south1

gcs:
  input_path: gs://your-bucket/raw/*.csv
  temp_path: gs://your-bucket/temp/
  output_path: gs://your-bucket/processed/

bigquery:
  dataset: etl_dataset
  table: processed_table
  write_mode: overwrite   # append / overwrite

schema:
  - name: id
    type: integer
  - name: name
    type: string
  - name: amount
    type: double
  - name: event_date
    type: date

transformations:
  drop_duplicates: true
  fill_nulls:
    amount: 0
    name: "unknown"
  filters:
    - "amount > 0"
  derived_columns:
    total_amount: "amount * 1.18"
  rename_columns:
    name: customer_name
